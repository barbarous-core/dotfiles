# Barbarous Premium Tmux Configuration
# ------------------------------------
# A high-performance, TTY-optimized setup 
# Inspired by: omerxx, Elijah Manor, and CodeOpsHQ

# --- General Settings ---
set -g default-terminal "xterm-256color"
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g history-limit 1000000     # Increase history (omerxx style)
set -g mouse on                  # Enable mouse support
set -g detach-on-destroy off     # Don't exit when closing a session
set -g escape-time 0             # No delay for escape key
set -g focus-events on           # Support focus events (for Vim)
set -g renumber-windows on       # Keep window numbers sequential

# --- The Famous Ctrl-Space Prefix ---
# (Inspired by: Elijah Manor & CodeOpsHQ)
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# --- Navigation (Vim Style) ---
# (Inspired by: Elijah Manor)
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Start indexing at 1 (Human friendly)
set -g base-index 1
setw -g pane-base-index 1

# --- Layout & Aesthetics ---
# (Inspired by: omerxx & CodeOpsHQ)
set -g status-position top       # Premium look
set -g pane-active-border-style 'fg=magenta,bg=default'
set -g pane-border-style 'fg=brightblack,bg=default'

# --- Key Bindings ---
# Quick reload
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# Improved Splitting (Inspired by: CodeOpsHQ)
# Open new panes in the current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Status Line (TTY Minimalist) ---
set -g status-style 'bg=default' # Transparent background
set -g status-left "#[fg=blue,bold] #S "
set -g status-right "#[fg=white,nobold] %H:%M #[fg=magenta,bold] #H "
set -g window-status-current-format "#[fg=magenta,bold] *#W "
set -g window-status-format "#[fg=brightblack,nobold] #W "
