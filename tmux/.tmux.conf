# Set terminal color
set-option -sa terminal-overrides ",xterm*:Tc"

# Set mouse 
set -g mouse off
# Set VI mode 
setw -g mode-keys vi 

# Set prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Set Indexing windows and panes at 1 not 0 
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-window on 

#Shift Alt vim keys to switch window
# bind -n M-H previous-window
# bind -n M-L next-window

# Set theme to minimal
set -g @catppuccin_flavour 'latte'

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Other list of plugins:
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

# set vi-mode
# set-window-option -g mode-keys vi
# keybinding
bind-key -T copy-move-vi v send-keys -X begin-selection 
bind-key -T copy-move-vi C-v send-keys -X rectangle-toogle
bind-key -T copy-move-vi y send-keys -X copy-selection-and-cancel

# Open panes in current directory
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"


# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
